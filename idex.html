<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nova</title>
<style>
body{background:#C0C0C0;font-family:sans-serif;padding:20px;margin:0;}
h1,h2{margin-top:20px;}
input,textarea,button{margin:5px 0;padding:5px;}
button:disabled{opacity:0.5;cursor:not-allowed;}
.memo{background:white;border-radius:8px;padding:10px;margin:10px 0;box-shadow:0 3px 6px rgba(0,0,0,0.2);}
.memoTitle{font-weight:bold;font-size:18px;margin-bottom:5px;}
.comment{margin-left:20px;padding:3px;background:#f0f0f0;border-radius:5px;}
@media (max-width:600px){input,textarea,button,select{width:100%;}}
</style>
</head>
<body>

<h1>Nova</h1>

<h2>ホーム</h2>
<button id="createBtn">メモを作る</button>
<button id="listBtn">メモ一覧</button>

<div id="createForm" style="display:none;">
<h2>メモ作成</h2>
<input id="memoTitle" placeholder="タイトル"><br>
<textarea id="memoContent" placeholder="本文"></textarea><br>
<input id="inviteUid" placeholder="招待するUID（カンマ区切り）"><br>
<button id="saveMemo">保存</button>
</div>

<div id="memoList" style="display:none;">
<h2>メモ一覧</h2>
<div id="memos"></div>
</div>

<!-- Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js"></script>

<script>
// 🔹 Firebase 設定
const firebaseConfig = {
  apiKey: "AIzaSyCxFJMFAYlnhjO5zvZY017Twbua-FIydaA",
  authDomain: "nova-dd54e.firebaseapp.com",
  projectId: "nova-dd54e",
  storageBucket: "nova-dd54e.firebasestorage.app",
  messagingSenderId: "984157274477",
  appId: "1:984157274477:web:4624013beb95775ccc5a64",
  measurementId: "G-MYF40R43LT"
};

firebase.initializeApp(firebaseConfig);
firebase.analytics();
const db = firebase.firestore();
const auth = firebase.auth();

let uid = null;

// 🔹 認証
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
.then(()=>auth.signInAnonymously())
.then(userCredential => { uid = userCredential.user.uid; console.log("認証完了 uid:", uid); })
.catch(err=>alert("認証エラー: "+err.message));

// 🔹 UI
const createBtn = document.getElementById("createBtn");
const listBtn = document.getElementById("listBtn");
const createForm = document.getElementById("createForm");
const memoList = document.getElementById("memoList");
const saveMemo = document.getElementById("saveMemo");

createBtn.onclick=()=>{ createForm.style.display="block"; memoList.style.display="none"; };
listBtn.onclick=()=>{ memoList.style.display="block"; createForm.style.display="none"; };

// 🔹 メモ作成
saveMemo.onclick=async()=>{
  if(!uid) return alert("認証中…少し待ってください");
  const title = document.getElementById("memoTitle").value;
  const content = document.getElementById("memoContent").value;
  const invitedUids = document.getElementById("inviteUid").value.split(",").map(u=>u.trim()).filter(u=>u);
  if(!title || !content) return alert("タイトルと本文を入力してください");
  await db.collection("notes").add({
    title, content, ownerUid:uid, invitedUids, createdAt:new Date(), updatedAt:new Date()
  });
  document.getElementById("memoTitle").value="";
  document.getElementById("memoContent").value="";
  document.getElementById("inviteUid").value="";
};

// 🔹 コメント作成
async function addComment(noteId, type, content){
  await db.collection("comments").add({
    noteId, userUid: uid, type, content, createdAt: new Date()
  });
}

// 🔹 メモ一覧
db.collection("notes").onSnapshot(snap=>{
  const div = document.getElementById("memos");
  div.innerHTML="";
  snap.forEach(d=>{
    const data = d.data();
    const id = d.id;
    if(data.ownerUid!==uid && !data.invitedUids.includes(uid)) return;

    const box = document.createElement("div"); box.className="memo";
    const title = document.createElement("div"); title.className="memoTitle"; title.textContent=data.title;
    const content = document.createElement("div"); content.textContent=data.content;
    box.appendChild(title); box.appendChild(content);

    // 編集・削除は作成者のみ
    if(data.ownerUid===uid){
      const editBtn = document.createElement("button"); editBtn.textContent="編集";
      editBtn.onclick=async()=>{
        const newTitle = prompt("タイトル",data.title);
        const newContent = prompt("本文",data.content);
        if(newTitle && newContent) await db.collection("notes").doc(id).update({title:newTitle, content:newContent, updatedAt:new Date()});
      }
      const delBtn = document.createElement("button"); delBtn.textContent="削除";
      delBtn.onclick=async()=>{ if(confirm("削除しますか？")) await db.collection("notes").doc(id).delete(); }
      box.appendChild(editBtn); box.appendChild(delBtn);
    }

    // チェックボタン
    const checkBtn = document.createElement("button"); checkBtn.textContent="作業済みチェック";
    checkBtn.onclick=()=>addComment(id,"check","完了");
    box.appendChild(checkBtn);

    // コメント入力
    const commentInput = document.createElement("input"); commentInput.placeholder="コメント";
    const commentBtn = document.createElement("button"); commentBtn.textContent="追加";
    commentBtn.onclick=()=>{ if(commentInput.value) addComment(id,"comment",commentInput.value); commentInput.value=""; }
    box.appendChild(commentInput); box.appendChild(commentBtn);

    // コメント表示
    const q = db.collection("comments").where("noteId","==",id).orderBy("createdAt");
    q.onSnapshot(snapC=>{
      const oldComments = box.querySelectorAll(".comment");
      oldComments.forEach(c=>c.remove());
      snapC.forEach(c=>{
        const com = document.createElement("div"); com.className="comment";
        const comData = c.data();
        com.textContent = `${comData.type==="check"?"✅":"💬"} (${comData.userUid}): ${comData.content}`;
        box.appendChild(com);
      });
    });

    div.appendChild(box);
  });
});
</script>
</body>
</html>
